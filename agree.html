<!DOCTYPE html>
<html>
<head>
<title>Agree Bean</title>

<style>
body{
margin:0;
overflow:hidden;
background: linear-gradient(to right,#ffe6f0,#fff5fa);
font-family: Comic Sans MS;
text-align:center;
padding-top:80px;
}
.heart{
position:absolute;
top:-50px;
color:#ff4da6;
animation: fall linear infinite;
}
@keyframes fall{
to{transform:translateY(110vh);}
}
.box{
display:inline-block;
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 0 30px hotpink;
animation: float 3s infinite;
}
@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}
h2{color:#ff4da6;}
.btn{
display:block;
margin:15px auto;
padding:15px 25px;
border:none;
border-radius:20px;
background:pink;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 15px hotpink;
}
#msg{
color:#ff1493;
font-size:20px;
height:40px;
}
.bunny{
position:absolute;
bottom:10px;
right:30px;
font-size:70px;
animation: hop 2s infinite;
}
@keyframes hop{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

/* GLOW POPUP */
.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:30px;
box-shadow:0 0 40px deeppink;
display:none;
animation: glow 1s infinite alternate;
z-index:5;
width:70%;
}
@keyframes glow{
from{box-shadow:0 0 20px pink;}
to{box-shadow:0 0 60px hotpink;}
}
.popup button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:20px;
background:pink;
color:white;
cursor:pointer;
}

/* NEXT BUTTON - initially hidden */
.nextBtn{
display:none;
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:25px;
background:deeppink;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 25px hotpink;
animation: glow 1s infinite alternate;
}
</style>

<script>

let clickCount=0;
let size2=1;
let size1=1;

function createHearts(){
for(let i=0;i<25;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*5)+"s";
document.body.appendChild(h);
}
}

function secondClick(){
clickCount++;

let msg=document.getElementById("msg");
let b2=document.getElementById("noBtn");
let b1=document.getElementById("yesBtn");

if(clickCount==1){
msg.innerHTML="kyun sochna pry ga batayein 🥺? han abhi b naraz hain?😔";
size2-=0.15;
b2.style.transform="scale("+size2+")";
}
else if(clickCount==2){
msg.innerHTML="na kro yr bs kro 🥺...naraz ho abhi b ?";
size2-=0.15;
b2.style.transform="scale("+size2+")";
}
else{
msg.innerHTML="pakar k dikhao pehle 😌🐰";

b2.onmouseover=function(){
let x=Math.random()*80;
let y=Math.random()*70;
b2.style.position="absolute";
b2.style.left=x+"vw";
b2.style.top=y+"vh";
}

size1+=0.05;
b1.style.transform="scale("+size1+")";
}
}

function yesClick(){
document.getElementById("popup").style.display="block";
burstHearts();

/* SHOW NEXT BUTTON ONLY AFTER YES CLICK */
document.getElementById("nextBtn").style.display="inline-block";
}

function closePop(){
document.getElementById("popup").style.display="none";
}

function burstHearts(){
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.innerHTML="💖";
h.style.position="absolute";
h.style.left=50+"vw";
h.style.top=50+"vh";
h.style.fontSize="25px";
h.style.animation="fall 3s linear";
document.body.appendChild(h);
}
}

function goNext(){
window.location.href="surprise.html";
}

window.onload=function(){
createHearts();
}

</script>

</head>

<body>

<div class="box">
<h2>now tell me ab narazgi khtm naw?🥺🥺🌸✨</h2>

<div id="msg"></div>

<button class="btn" id="yesBtn" onclick="yesClick()">
Meri jaan apse naraz nahi ho skta mai yar🌸😭
</button>

<button class="btn" id="noBtn" onclick="secondClick()">
Sochna pry ga abhi🙂
</button>

<!-- NEXT BUTTON (hidden initially) -->
<button class="nextBtn" id="nextBtn" onclick="goNext()">Next </button>

</div>

<div class="popup" id="popup">
<p>
I know my love ap mugh sy naraz ho hi nahi skty zada der apka b dil nahi lgta  
bs drmy krty huh😁🎀...  
dont wory ab tang nahi krungi apko🌺✨..  
itnaaa lamba distance mat liya krain yr mugh sy pleaseeeeeeeee🥺🥺🥺🌸..
</p>

<button onclick="closePop()">Close 💗</button>
</div>

<div class="bunny">🐰</div>

</body>
</html>
